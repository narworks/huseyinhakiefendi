<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sayfa Bulunamadı — Hüseyin Haki Efendi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Cinzel:wght@400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d1b2a;
      color: #f5efe0;
      font-family: 'Playfair Display', Georgia, serif;
      text-align: center;
      padding: 2rem;
    }
    .code {
      font-family: 'Cinzel', serif;
      font-size: 6rem;
      color: #c9a84c;
      line-height: 1;
      margin-bottom: 1rem;
    }
    h1 { font-size: 1.5rem; margin-bottom: 1rem; font-weight: 400; }
    p { font-size: 1rem; color: #b2bec3; margin-bottom: 2rem; max-width: 400px; }
    a {
      display: inline-block;
      font-family: 'Cinzel', serif;
      font-size: 0.8rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #c9a84c;
      border: 1px solid rgba(201,168,76,0.4);
      padding: 0.75rem 2rem;
      border-radius: 4px;
      text-decoration: none;
      transition: all 0.3s ease;
    }
    a:hover {
      background: rgba(201,168,76,0.1);
      border-color: #c9a84c;
    }
  </style>
</head>
<body>
  <div>
    <div class="code">404</div>
    <h1>Bu rota haritada yok</h1>
    <p>Aradığınız sayfa, zamanın akıntısında kaybolmuş olabilir.</p>
    <a href="/">Ana Sayfaya Dön</a>
  </div>
</body>
</html>
